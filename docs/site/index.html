<!doctype html>
<html lang="en">
    <head>
        <base href="/" />
        <meta charset="UTF-8" />
        <title>Mithril Bitstillery</title>
        <link href="/style.css" rel="stylesheet" />
        <link href="/public/logo.svg" rel="icon" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="Mithril Documentation" />
    </head>

    <body>
        <div id="app"></div>
        <script type="module" src="./client.tsx"></script>
        <script>
            // Hamburger and nav: use event delegation (works before/after app mounts)
            document.body.addEventListener('click', function (e) {
                if (e.target.closest('.hamburger')) {
                    document.body.className = document.body.className === 'navigating' ? '' : 'navigating'
                }
                if (e.target.closest('.docs-sidebar')) {
                    var link = e.target.closest('a[href]')
                    if (link) {
                        var href = link.getAttribute('href') || ''
                        var isAnchor = href.indexOf('#') >= 0
                        var path = href.split('#')[0] || '/'
                        var currentPath = window.location.pathname || '/'
                        if (currentPath.endsWith('/')) currentPath = currentPath.slice(0, -1) || '/'
                        if (path.endsWith('/')) path = path.slice(0, -1) || '/'
                        if (isAnchor && (path === '' || path === currentPath)) return
                        window.scrollTo(0, 0)
                        if (path === currentPath && window.location.hash) {
                            history.replaceState(null, '', window.location.pathname + window.location.search)
                        }
                    }
                    document.body.className = ''
                }
            })
        </script>
    </body>
</html>

    <link rel="stylesheet" crossorigin href="./chunk-2sy06v3g.css"><script type="module" crossorigin src="./chunk-vwcsm8dy.js"></script></head>

    <body>
        <div id="app"></div>
        
        <script>
            // Hamburger and nav: use event delegation (works before/after app mounts)
            document.body.addEventListener('click', function (e) {
                if (e.target.closest('.hamburger')) {
                    document.body.className = document.body.className === 'navigating' ? '' : 'navigating'
                }
                if (e.target.closest('.docs-sidebar')) {
                    document.body.className = ''
                }
            })
        </script>
    </body>
</html>
